apiVersion: 1

# Contact points (no email/Slack in dev — just the default null receiver)
contactPoints:
  - orgId: 1
    name: sentinelpay-default
    receivers:
      - uid: sentinelpay-null
        type: email
        settings:
          addresses: ops@sentinelpay.com
        disableResolveMessage: false

# Notification policy — all alerts route to the default receiver
policies:
  - orgId: 1
    receiver: sentinelpay-default
    group_by: ['alertname', 'job']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
