server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=sentinelpay"]
    relabel_configs:
      # Use the container name as the job label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Use the compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Keep only containers that are running
      - source_labels: ['__meta_docker_container_state']
        regex: 'running'
        action: keep
    pipeline_stages:
      # Parse Spring Boot log format: timestamp [thread] [traceId/spanId] level logger - message
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\s+\[(?P<thread>[^\]]+)\]\s+(\[(?P<trace_id>[^\]]+)\])?\s*(?P<level>\w+)\s+(?P<logger>\S+)\s+-\s+(?P<message>.*)$'
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05'
