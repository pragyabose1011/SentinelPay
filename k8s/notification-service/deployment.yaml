apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sentinelpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sentinelpay
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: notification-service
          image: ghcr.io/OWNER/sentinelpay-notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: NOTIFICATION_DATASOURCE_URL
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: NOTIFICATION_SERVER_PORT
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: MAIL_PORT
            - name: MAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: MAIL_FROM
            - name: DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: DATASOURCE_USERNAME
            - name: DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: JWT_REFRESH_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: notification-service
                topologyKey: topology.kubernetes.io/zone
