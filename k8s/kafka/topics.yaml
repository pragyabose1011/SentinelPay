# ---------------------------------------------------------------------------
# SentinelPay — Kafka Topics (managed by Strimzi Topic Operator)
# ---------------------------------------------------------------------------
# RF=3 for business topics; DLT topics use RF=3 but only 1 partition
# (dead letters are not order-sensitive, 1 partition simplifies reprocessing).
# ---------------------------------------------------------------------------

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: payment-transactions
  namespace: sentinelpay
  labels:
    strimzi.io/cluster: sentinelpay
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "604800000"       # 7 days
    min.insync.replicas: "2"
    cleanup.policy: delete

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: payment-transactions-dlt
  namespace: sentinelpay
  labels:
    strimzi.io/cluster: sentinelpay
spec:
  topicName: payment.transactions.DLT
  partitions: 1
  replicas: 3
  config:
    retention.ms: "2592000000"      # 30 days — keep dead letters longer for analysis
    min.insync.replicas: "2"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kyc-events
  namespace: sentinelpay
  labels:
    strimzi.io/cluster: sentinelpay
spec:
  topicName: kyc.events
  partitions: 3
  replicas: 3
  config:
    retention.ms: "604800000"
    min.insync.replicas: "2"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kyc-events-dlt
  namespace: sentinelpay
  labels:
    strimzi.io/cluster: sentinelpay
spec:
  topicName: kyc.events.DLT
  partitions: 1
  replicas: 3
  config:
    retention.ms: "2592000000"
    min.insync.replicas: "2"
