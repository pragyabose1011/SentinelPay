# ---------------------------------------------------------------------------
# Secret Template — DO NOT COMMIT REAL VALUES
# ---------------------------------------------------------------------------
# Replace placeholder values with real secrets before applying.
# Production recommendation: manage this with Sealed Secrets or
# External Secrets Operator (ESO) pointing to AWS Secrets Manager / Vault.
#
# Apply with:
#   kubectl apply -f k8s/config/secret-template.yaml -n sentinelpay
#
# Or seal it first:
#   kubeseal --format yaml < k8s/config/secret-template.yaml > k8s/config/sealed-secret.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: sentinelpay-secrets
  namespace: sentinelpay
type: Opaque
stringData:
  # ---- Database credentials (must match CloudNativePG cluster bootstrap) ----
  DATASOURCE_USERNAME: "sentinelpay"
  DATASOURCE_PASSWORD: "REPLACE_ME_strong_db_password"

  # ---- JWT signing secrets (generate: openssl rand -base64 48) --------------
  JWT_SECRET: "REPLACE_ME_min_32_chars_access_secret"
  JWT_REFRESH_SECRET: "REPLACE_ME_min_32_chars_refresh_secret"

  # ---- API Gateway TLS keystore password ------------------------------------
  SSL_KEYSTORE_PASSWORD: "REPLACE_ME_keystore_password"

  # ---- Mail SMTP credentials (leave blank if using Mailhog in dev) ----------
  MAIL_USERNAME: ""
  MAIL_PASSWORD: ""

  # ---- Razorpay (only needed when RAZORPAY_ENABLED=true) --------------------
  RAZORPAY_KEY_ID: "rzp_live_REPLACE_ME"
  RAZORPAY_KEY_SECRET: "REPLACE_ME_razorpay_key_secret"
  RAZORPAY_WEBHOOK_SECRET: "REPLACE_ME_razorpay_webhook_secret"

  # ---- Grafana admin --------------------------------------------------------
  GF_SECURITY_ADMIN_PASSWORD: "REPLACE_ME_grafana_password"
