apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: sentinelpay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    # CPU only — JVM heap does not drop quickly after GC so memory utilization
    # is not a reliable load signal and causes constant scale-up/scale-down cycles.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # gateway is mostly I/O; keep CPU slack for spikes
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0    # scale up immediately under traffic bursts
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
