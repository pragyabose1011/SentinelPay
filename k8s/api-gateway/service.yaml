apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: sentinelpay
spec:
  # LoadBalancer exposes the gateway externally; for bare-metal clusters use
  # NodePort or rely on the Ingress controller below.
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - port: 443
      targetPort: 8443
      name: https
    - port: 80
      targetPort: 8443
      name: http-redirect
