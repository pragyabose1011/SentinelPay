apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: sentinelpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: sentinelpay
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: api-gateway
          image: ghcr.io/OWNER/sentinelpay-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
              name: https
          env:
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: PAYMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: NOTIFICATION_SERVICE_URL
            - name: KYC_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: KYC_SERVICE_URL
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: GATEWAY_SERVER_PORT
            - name: SSL_ENABLED
              value: "true"
            - name: JWT_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: JWT_EXPIRATION_MS
            - name: JWT_REFRESH_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: JWT_REFRESH_EXPIRATION_MS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: JWT_REFRESH_SECRET
            - name: SSL_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: SSL_KEYSTORE_PASSWORD
            # ConfigMap entries not directly used by gateway but passed via common-env
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: sentinelpay-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: DATASOURCE_USERNAME
            - name: DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: DATASOURCE_PASSWORD
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api-gateway
                topologyKey: topology.kubernetes.io/zone
