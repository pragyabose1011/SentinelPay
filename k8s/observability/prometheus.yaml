# ---------------------------------------------------------------------------
# SentinelPay — Prometheus (in-cluster)
# Reuses the same prometheus.yml already used by docker-compose.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sentinelpay
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # ---- Scrape pods annotated with prometheus.io/scrape=true ----------------
      - job_name: sentinelpay-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [sentinelpay]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: job

      # ---- Prometheus self-monitoring ------------------------------------------
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

  rules.yml: |
    groups:
      - name: sentinelpay
        rules:
          - alert: ServiceDown
            expr: up{job=~"payment-service|notification-service|kyc-service"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"

          - alert: HighPaymentErrorRate
            expr: |
              rate(sentinelpay_payments_total{outcome="error"}[5m])
              / rate(sentinelpay_payments_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Payment error rate > 10% for {{ $labels.job }}"

          - alert: OutboxEventsParked
            expr: sentinelpay_outbox_parked > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $value }} outbox events are parked (max retries exceeded)"

          - alert: HighHttpErrorRate
            expr: |
              sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              / sum by (job) (rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "HTTP 5xx rate > 5% for {{ $labels.job }}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: sentinelpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: sentinelpay
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: sentinelpay
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: sentinelpay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http

---
# ServiceAccount + ClusterRole so Prometheus can discover pods/services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: sentinelpay

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sentinelpay-prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sentinelpay-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sentinelpay-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: sentinelpay
