# ---------------------------------------------------------------------------
# MinIO — distributed mode, 4 pods with erasure coding.
#
# Erasure coding with 4 pods uses EC:2 (2 data + 2 parity shards).
# The cluster tolerates losing any 2 pods simultaneously without data loss.
# Total usable capacity = 2 × pod PVC size = 40 Gi (out of 80 Gi raw).
#
# Install:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm repo update
#   helm upgrade --install minio bitnami/minio \
#     --namespace sentinelpay \
#     --values k8s/observability/minio-values.yaml \
#     --set auth.rootPassword="$(kubectl get secret sentinelpay-secrets \
#         -n sentinelpay -o jsonpath='{.data.MINIO_ROOT_PASSWORD}' | base64 -d)"
#
# Credentials: rootUser is hardcoded to "minio"; rootPassword comes from
# sentinelpay-secrets.MINIO_ROOT_PASSWORD (see k8s/config/secret-template.yaml).
# ---------------------------------------------------------------------------

mode: distributed

statefulset:
  replicaCount: 4        # minimum 4 for erasure coding; must be even
  drivesPerNode: 1       # one PVC per pod

auth:
  rootUser: minio
  # rootPassword injected at install time via --set (never stored in this file)

persistence:
  enabled: true
  size: 20Gi             # per pod — 80 Gi raw, 40 Gi usable after EC:2

# Pre-create all three Loki buckets on first boot.
# Provisioning runs as a post-install Job; it will retry until the cluster quorum is healthy.
provisioning:
  enabled: true
  buckets:
    - name: sentinelpay-loki-chunks
    - name: sentinelpay-loki-ruler
    - name: sentinelpay-loki-admin

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001
