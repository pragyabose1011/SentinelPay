# ---------------------------------------------------------------------------
# Elasticsearch — 3-node cluster, used as Jaeger trace storage.
#
# A 3-node cluster provides:
#   • Quorum-based master election (requires ≥2 nodes to elect a master)
#   • Index replicas — Jaeger writes primary + 1 replica shard, so each
#     index survives losing any single node without data loss
#   • Cluster tolerates one simultaneous node/disk failure and remains writable
#
# Cluster discovery uses the headless service DNS as the seed host.
# cluster.initial_master_nodes must list all pod names to bootstrap correctly;
# after the cluster is formed the first time, this setting is ignored.
# ---------------------------------------------------------------------------
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: sentinelpay
spec:
  serviceName: elasticsearch-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: sentinelpay
    spec:
      initContainers:
        # ES requires vm.max_map_count >= 262144 on the host
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: elasticsearch
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
          env:
            # Cluster formation — DO NOT set discovery.type: single-node for multi-node clusters
            - name: cluster.name
              value: sentinelpay-traces
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Seed hosts: the headless service resolves to all pod IPs
            - name: discovery.seed_hosts
              value: "elasticsearch-headless"
            # List every pod name so any pod can bootstrap the cluster first
            - name: cluster.initial_master_nodes
              value: "elasticsearch-0,elasticsearch-1,elasticsearch-2"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: xpack.security.enabled
              value: "false"   # disable TLS/auth for in-cluster use; enable for internet-exposed clusters
            # Minimum master-eligible nodes required to elect — prevents split-brain
            # (floor(3/2) + 1 = 2; ES 7+ sets this automatically, kept explicit for clarity)
            - name: cluster.routing.allocation.disk.threshold_enabled
              value: "true"
            - name: cluster.routing.allocation.disk.watermark.low
              value: "85%"
            - name: cluster.routing.allocation.disk.watermark.high
              value: "90%"
            - name: cluster.routing.allocation.disk.watermark.flood_stage
              value: "95%"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          readinessProbe:
            httpGet:
              # yellow = all primary shards assigned (replicas may still be relocating)
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi

---
# ClusterIP — Jaeger collector and query UI talk to this
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: elasticsearch
spec:
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: http
    - name: transport
      port: 9300
      targetPort: transport

---
# Headless — used as the seed_hosts for cluster discovery and stable pod DNS
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: elasticsearch
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
    - name: transport
      port: 9300
