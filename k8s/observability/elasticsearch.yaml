# ---------------------------------------------------------------------------
# Elasticsearch — single-node, used as Jaeger trace storage.
#
# For production HA: scale to 3 nodes and set discovery.seed_hosts +
# cluster.initial_master_nodes to all 3 pod DNS names.
# ---------------------------------------------------------------------------
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: sentinelpay
spec:
  serviceName: elasticsearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: sentinelpay
    spec:
      initContainers:
        # ES requires vm.max_map_count >= 262144 on the host
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
          env:
            - name: discovery.type
              value: single-node
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: xpack.security.enabled
              value: "false"   # disable TLS/auth for in-cluster use; enable for internet-exposed clusters
            - name: cluster.name
              value: sentinelpay-traces
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: elasticsearch
spec:
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: http
    - name: transport
      port: 9300
      targetPort: transport
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: sentinelpay
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
    - name: transport
      port: 9300
