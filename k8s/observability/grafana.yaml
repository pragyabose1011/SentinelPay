apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinelpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: sentinelpay
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_SERVER_DOMAIN
              value: grafana.sentinelpay.com
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.sentinelpay.com"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: alertingSimplifiedRouting
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            # Default home dashboard — provisioned from ConfigMap, so it survives PVC loss
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/sentinelpay.json
            # ---------------------------------------------------------------------------
            # Database — PostgreSQL instead of the default SQLite.
            # Uses the same CloudNativePG cluster (rw endpoint) and sentinelpay user.
            # Grafana's state (users, alert rules, API keys) is now in the same
            # HA Postgres cluster that has WAL archiving + 30-day S3 backups.
            # ---------------------------------------------------------------------------
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GF_DATABASE_HOST
              value: sentinelpay-postgres-rw.sentinelpay.svc.cluster.local:5432
            - name: GF_DATABASE_NAME
              value: grafana
            - name: GF_DATABASE_USER
              value: sentinelpay
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: DATASOURCE_PASSWORD
            - name: GF_DATABASE_SSL_MODE
              value: disable
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinelpay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http

---
# Ingress for Grafana — separate subdomain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: sentinelpay
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.sentinelpay.com
      secretName: grafana-tls-cert
  rules:
    - host: grafana.sentinelpay.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
# ConfigMap pointing Grafana to its provisioning files.
# The actual datasources.yml / dashboards.yml / sentinelpay.json are
# mounted from the docker/grafana/ directory contents baked into this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sentinelpay
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.sentinelpay.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.sentinelpay.svc.cluster.local
        editable: false
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: sentinelpay
        folder: SentinelPay
        type: file
        disableDeletion: true
        # allowUiUpdates: false prevents Grafana from saving UI edits back to the
        # provisioned dashboard. Any dashboard change must go through the ConfigMap
        # and be committed to git — the UI shows a read-only indicator.
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards

  # ---------------------------------------------------------------------------
  # Alerting — provision the Alertmanager contact point and default policy.
  # Alert rules added in the UI are still saved to SQLite; export them via
  # Grafana's "Export" button and store the JSON in this ConfigMap to make
  # them durable.
  # ---------------------------------------------------------------------------
  alerting/contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Alertmanager
        receivers:
          - uid: alertmanager-receiver
            type: prometheus-alertmanager
            settings:
              url: http://alertmanager.sentinelpay.svc.cluster.local:9093
            disableResolveMessage: false

  alerting/policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Alertmanager
        group_by: [alertname, job, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: Alertmanager
            matchers:
              - severity = critical
            repeat_interval: 1h
