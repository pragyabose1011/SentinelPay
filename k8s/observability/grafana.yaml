apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinelpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: sentinelpay
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelpay-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_SERVER_DOMAIN
              value: grafana.sentinelpay.com
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.sentinelpay.com"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: alertingSimplifiedRouting
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: sentinelpay
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sentinelpay
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinelpay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http

---
# Ingress for Grafana — separate subdomain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: sentinelpay
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.sentinelpay.com
      secretName: grafana-tls-cert
  rules:
    - host: grafana.sentinelpay.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
# ConfigMap pointing Grafana to its provisioning files.
# The actual datasources.yml / dashboards.yml / sentinelpay.json are
# mounted from the docker/grafana/ directory contents baked into this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sentinelpay
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.sentinelpay.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.sentinelpay.svc.cluster.local:3100
        editable: false
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: sentinelpay
        folder: SentinelPay
        type: file
        disableDeletion: true
        options:
          path: /var/lib/grafana/dashboards
