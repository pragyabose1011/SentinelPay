apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: sentinelpay
data:
  sentinelpay.json: |
    {
      "title": "SentinelPay \u2014 Operations",
      "uid": "sentinelpay-ops",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["sentinelpay"],
      "panels": [
        {
          "id": 1,
          "title": "Service Health",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "up{job=~\"payment-service|notification-service|kyc-service\"}",
              "legendFormat": "{{job}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 1 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "horizontal", "textMode": "name+value", "colorMode": "background" }
        },
        {
          "id": 2,
          "title": "Payment Throughput (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "rate(sentinelpay_payments_total{outcome=\"success\"}[2m])", "legendFormat": "{{type}} success" },
            { "expr": "rate(sentinelpay_payments_total{outcome=\"error\"}[2m])", "legendFormat": "{{type}} error" }
          ],
          "fieldConfig": { "defaults": { "custom": { "lineWidth": 2 }, "unit": "reqps" } }
        },
        {
          "id": 3,
          "title": "Payment Duration (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "histogram_quantile(0.50, rate(sentinelpay_payment_duration_seconds_bucket[2m]))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, rate(sentinelpay_payment_duration_seconds_bucket[2m]))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, rate(sentinelpay_payment_duration_seconds_bucket[2m]))", "legendFormat": "p99" }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 4,
          "title": "HTTP Request Rate by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum by (job) (rate(http_server_requests_seconds_count[2m]))", "legendFormat": "{{job}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 5,
          "title": "HTTP 5xx Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum by (job) (rate(http_server_requests_seconds_count{status=~\"5..\"}[2m]))", "legendFormat": "{{job}} 5xx" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 }, "color": { "fixedColor": "red", "mode": "fixed" } } }
        },
        {
          "id": 6,
          "title": "Rate Limit Exceeded (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "rate(sentinelpay_rate_limit_exceeded_total[2m])", "legendFormat": "rate limited" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "fixedColor": "orange", "mode": "fixed" } } }
        },
        {
          "id": 7,
          "title": "Outbox Parked Events",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sentinelpay_outbox_parked", "legendFormat": "parked", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "orange", "value": 1 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "textMode": "auto" }
        },
        {
          "id": 8,
          "title": "Outbox Publish Errors (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "rate(sentinelpay_outbox_publish_errors_total[2m])", "legendFormat": "publish errors" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "fixedColor": "red", "mode": "fixed" } } }
        },
        {
          "id": 9,
          "title": "JVM Heap Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "jvm_memory_used_bytes{area=\"heap\", job=~\"payment-service|notification-service|kyc-service\"}", "legendFormat": "{{job}} {{id}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 10,
          "title": "JVM Threads",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "jvm_threads_live_threads{job=~\"payment-service|notification-service|kyc-service\"}", "legendFormat": "{{job}} live" },
            { "expr": "jvm_threads_peak_threads{job=~\"payment-service|notification-service|kyc-service\"}", "legendFormat": "{{job}} peak" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 11,
          "title": "Logs \u2014 payment-service",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            { "expr": "{service=\"payment-service\"}", "legendFormat": "" }
          ],
          "options": { "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true }
        }
      ]
    }
