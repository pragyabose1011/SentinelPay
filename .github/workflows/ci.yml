name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "k8s/**"
      - "docker/**"
      - "*.md"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel old runs when new commits arrive on the same branch

jobs:
  # ---------------------------------------------------------------------------
  # Build + test all services
  # ---------------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Cache Maven local repo for faster subsequent runs
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build and test (all modules)
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            verify \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          # Docker socket for Testcontainers
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

      # Publish test results as a check on the PR
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: "**/surefire-reports/*.xml"
          reporter: java-junit

  # ---------------------------------------------------------------------------
  # E2E tests — gateway HTTP round-trips with WireMock stubs
  # No external infrastructure needed; runs after unit tests pass.
  # ---------------------------------------------------------------------------
  e2e-test:
    name: Gateway E2E Tests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Run E2E tests (api-gateway)
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            test \
            -pl api-gateway \
            -Dgroups=e2e \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Gateway E2E Tests
          path: "api-gateway/**/surefire-reports/*.xml"
          reporter: java-junit

  # ---------------------------------------------------------------------------
  # Integration tests — payment-service against real Postgres, Redis, Kafka
  # Runs after unit tests pass; uses GHA service containers (no Docker-in-Docker).
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, e2e-test]
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinelpay
          POSTGRES_PASSWORD: sentinelpay_test
          POSTGRES_DB: sentinelpay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.6.1
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Create additional test databases
        run: |
          PGPASSWORD=sentinelpay_test psql \
            -h localhost -U sentinelpay -d sentinelpay \
            -c "CREATE DATABASE sentinelpay_notifications;" || true
          PGPASSWORD=sentinelpay_test psql \
            -h localhost -U sentinelpay -d sentinelpay \
            -c "CREATE DATABASE sentinelpay_kyc;" || true

      - name: Run integration tests (payment-service)
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            verify \
            -pl payment-service \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dfailsafe.failIfNoSpecifiedTests=false \
            -Dgroups=integration
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sentinelpay
          SPRING_DATASOURCE_USERNAME: sentinelpay
          SPRING_DATASOURCE_PASSWORD: sentinelpay_test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          JWT_SECRET: integration-test-secret-min-32-chars-long
          JWT_REFRESH_SECRET: integration-test-refresh-secret-min-32-chars
          RAZORPAY_ENABLED: "false"
          MAIL_HOST: localhost
          MAIL_PORT: 1025

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: "payment-service/**/failsafe-reports/*.xml"
          reporter: java-junit

  # ---------------------------------------------------------------------------
  # Static analysis — OWASP dependency vulnerability scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Run OWASP dependency-check
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            org.owasp:dependency-check-maven:aggregate \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml || true
        continue-on-error: true   # warn but don't block PRs on NVD data delays

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30
