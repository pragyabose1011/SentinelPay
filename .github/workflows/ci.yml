name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "k8s/**"
      - "docker/**"
      - "*.md"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel old runs when new commits arrive on the same branch

jobs:
  # ---------------------------------------------------------------------------
  # Build + test all services
  # ---------------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Cache Maven local repo for faster subsequent runs
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build and test (all modules)
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            verify \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          # Docker socket for Testcontainers
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

      # Publish test results as a check on the PR
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: "**/surefire-reports/*.xml"
          reporter: java-junit

  # ---------------------------------------------------------------------------
  # Static analysis — OWASP dependency vulnerability scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Run OWASP dependency-check
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            org.owasp:dependency-check-maven:aggregate \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml || true
        continue-on-error: true   # warn but don't block PRs on NVD data delays

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30
