name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"
      - "*.md"

concurrency:
  group: cd-main
  cancel-in-progress: false   # never cancel a deploy in-flight

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # Build, test, and push all service images to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build all services (skip tests — CI already ran them)
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            package \
            -DskipTests \
            -Dmaven.test.skip=true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (multi-platform + cache)
        uses: docker/setup-buildx-action@v3

      # Compute image tag: short SHA + timestamp for traceability
      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${SHORT_SHA}"

      # Build and push each service image in parallel using a matrix
      - name: Build & push payment-service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sentinelpay-payment-service:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sentinelpay-payment-service:latest
          cache-from: type=gha,scope=payment-service
          cache-to: type=gha,mode=max,scope=payment-service

      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sentinelpay-notification-service:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sentinelpay-notification-service:latest
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service

      - name: Build & push kyc-service
        uses: docker/build-push-action@v5
        with:
          context: ./kyc-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sentinelpay-kyc-service:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sentinelpay-kyc-service:latest
          cache-from: type=gha,scope=kyc-service
          cache-to: type=gha,mode=max,scope=kyc-service

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sentinelpay-api-gateway:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sentinelpay-api-gateway:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

  # ---------------------------------------------------------------------------
  # Rolling deploy to Kubernetes
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # requires manual approval gate in GitHub Environments
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply ConfigMap + Namespace (idempotent)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/config/configmap.yaml

      # Patch each deployment to the new image tag → triggers rolling update
      - name: Deploy payment-service
        run: |
          kubectl set image deployment/payment-service \
            payment-service=${{ env.IMAGE_PREFIX }}/sentinelpay-payment-service:${{ needs.build-and-push.outputs.image-tag }} \
            -n sentinelpay
          kubectl rollout status deployment/payment-service -n sentinelpay --timeout=300s

      - name: Deploy notification-service
        run: |
          kubectl set image deployment/notification-service \
            notification-service=${{ env.IMAGE_PREFIX }}/sentinelpay-notification-service:${{ needs.build-and-push.outputs.image-tag }} \
            -n sentinelpay
          kubectl rollout status deployment/notification-service -n sentinelpay --timeout=300s

      - name: Deploy kyc-service
        run: |
          kubectl set image deployment/kyc-service \
            kyc-service=${{ env.IMAGE_PREFIX }}/sentinelpay-kyc-service:${{ needs.build-and-push.outputs.image-tag }} \
            -n sentinelpay
          kubectl rollout status deployment/kyc-service -n sentinelpay --timeout=300s

      - name: Deploy api-gateway
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.IMAGE_PREFIX }}/sentinelpay-api-gateway:${{ needs.build-and-push.outputs.image-tag }} \
            -n sentinelpay
          kubectl rollout status deployment/api-gateway -n sentinelpay --timeout=300s

      # Annotate deployments with the git commit for traceability
      - name: Annotate deployments with commit SHA
        if: success()
        run: |
          SHA="${{ github.sha }}"
          for svc in payment-service notification-service kyc-service api-gateway; do
            kubectl annotate deployment/$svc \
              kubernetes.io/change-cause="Deploy $SHA from CI/CD" \
              --overwrite \
              -n sentinelpay
          done

      - name: Verify all deployments healthy
        run: |
          kubectl get deployments -n sentinelpay
          kubectl get pods -n sentinelpay
