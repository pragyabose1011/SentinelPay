spring:
  application:
    name: payment-service

  # PostgreSQL data source
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/sentinelpay}
    username: ${DATASOURCE_USERNAME:sentinelpay}
    password: ${DATASOURCE_PASSWORD:sentinelpay}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # Flyway database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Mail (password-reset emails; Mailhog in dev, real SMTP in prod)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

  # Redis (rate limiting, distributed locks, idempotency cache)
  # Standalone mode (dev/docker-compose): set REDIS_HOST + REDIS_PORT.
  # Sentinel mode (K8s prod): set REDIS_SENTINEL_MASTER + REDIS_SENTINEL_NODES.
  # Spring Boot picks sentinel mode automatically when sentinel.nodes is non-empty.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:}
        nodes: ${REDIS_SENTINEL_NODES:}
        password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      # Expose /actuator/health/liveness and /actuator/health/readiness
      # (Spring Boot auto-enables these when KUBERNETES_SERVICE_HOST is set,
      # but explicit config avoids surprises in non-standard environments)
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  tracing:
    sampling:
      probability: 1.0   # 100% in dev; reduce to 0.1 in prod
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Logging — include correlationId and OTel trace/span IDs in every line
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  level:
    com.sentinelpay: DEBUG
    org.springframework.security: INFO

# ============================================================
# SentinelPay custom configuration
# ============================================================
sentinelpay:

  jwt:
    secret: ${JWT_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}            # 15 min default
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days default
    blocklist-prefix: "blocklist:"

  fraud:
    enabled: ${FRAUD_ENABLED:true}   # set to false in dev/test to skip scoring

  kyc:
    transfer-limit: ${KYC_TRANSFER_LIMIT:500000}    # INR; require KYC above ₹5,00,000

  outbox:
    poll-interval-ms: ${OUTBOX_POLL_MS:5000}
    max-retries: ${OUTBOX_MAX_RETRIES:5}

  rate-limiter:
    fail-open: ${RATE_LIMITER_FAIL_OPEN:true}

  auth:
    max-failed-attempts: ${AUTH_MAX_FAILED_ATTEMPTS:5}
    lock-duration-minutes: ${AUTH_LOCK_DURATION_MINUTES:30}
    failure-window-minutes: ${AUTH_FAILURE_WINDOW_MINUTES:15}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

  mail:
    from: ${MAIL_FROM:noreply@sentinelpay.com}

  kafka:
    topics:
      kyc: kyc.events

  razorpay:
    enabled: ${RAZORPAY_ENABLED:false}
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}
    base-url: https://api.razorpay.com/v1

# ============================================================
# Resilience4j — circuit breaker on Redis calls
# ============================================================
resilience4j:
  circuitbreaker:
    instances:
      redis:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 1s
