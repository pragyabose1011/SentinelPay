spring:
  application:
    name: payment-service

  # PostgreSQL data source
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/sentinelpay}
    username: ${DATASOURCE_USERNAME:sentinelpay}
    password: ${DATASOURCE_PASSWORD:sentinelpay}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # Flyway database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Redis (rate limiting, distributed locks, idempotency cache)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0   # 100% in dev; reduce to 0.1 in prod
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Logging — include correlationId and OTel trace/span IDs in every line
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  level:
    com.sentinelpay: DEBUG
    org.springframework.security: INFO

# ============================================================
# SentinelPay custom configuration
# ============================================================
sentinelpay:

  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours

  fraud:
    enabled: ${FRAUD_ENABLED:true}   # set to false in dev/test to skip scoring

  kyc:
    transfer-limit: ${KYC_TRANSFER_LIMIT:500000}    # INR; require KYC above ₹5,00,000

  outbox:
    poll-interval-ms: ${OUTBOX_POLL_MS:5000}

  kafka:
    topics:
      kyc: kyc.events

# ============================================================
# Resilience4j — circuit breaker on Redis calls
# ============================================================
resilience4j:
  circuitbreaker:
    instances:
      redis:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 1s
