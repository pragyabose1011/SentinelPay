spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Testcontainers overrides datasource via @ServiceConnection — no URL needed here
  kafka:
    bootstrap-servers: localhost:9092   # mocked via @MockBean KafkaTemplate

  data:
    redis:
      host: localhost
      port: 6379   # mocked via @MockBean RedisTemplate
      repositories:
        enabled: false   # disable RedisKeyValueAdapter — we use RedisTemplate directly

sentinelpay:
  jwt:
    secret: test-secret-key-min-32-characters-long!!
    expiration-ms: 3600000
  fraud:
    enabled: true
  kyc:
    transfer-limit: 500000   # ₹5,00,000 — require KYC above this
